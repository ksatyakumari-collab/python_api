    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
        }
        canvas {
            max-width: 100%;
        }
        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.loading {
            background-color: #e3f2fd;
            color: #1976d2;
        }
        .status.success {
            background-color: #e8f5e9;
            color: #388e3c;
        }
        .status.error {
            background-color: #ffebee;
            color: #c62828;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Document Access Chart (Last 24 Hours)</h1>
        <div id="status" class="status loading">Loading data...</div>
        <div class="chart-wrapper">
            <canvas id="accessChart"></canvas>
        </div>
        <button onclick="fetchAndDrawChart()">Refresh Data</button>
    </div>

    <script>
        let chart = null;

        function fetchAndDrawChart() {
            const statusDiv = $('#status');
            statusDiv.removeClass('success error').addClass('loading').text('Loading data...');

            $.ajax({
                url: 'http://localhost:5000/count/recent',
                method: 'GET',
                data: {type: 'hour'},
                dataType: 'json',
                crossDomain: true,
                success: function(response) {
                    statusDiv.removeClass('loading error').addClass('success').text('✓ Data loaded successfully');
                    drawChart(response.data);
                },
                error: function(xhr, status, error) {
                    statusDiv.removeClass('loading success').addClass('error')
                        .text(`✗ Error: ${error}. Make sure the API is running on http://localhost:5000`);
                    console.error('Error fetching data:', error);
                }
            });
        }

        function drawChart(data) {
            // Extract times and counts
            const times = data.map(item => item.time);
            const counts = data.map(item => item.count);

            // Destroy previous chart if it exists
            if (chart) {
                chart.destroy();
            }

            // Create new chart
            const ctx = document.getElementById('accessChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [{
                        label: 'Document Access Count',
                        data: counts,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7,
                        pointHoverBackgroundColor: '#764ba2'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: {
                                    size: 14,
                                    weight: 'bold'
                                },
                                padding: 15
                            }
                        },
                        title: {
                            display: true,
                            text: 'Documents Accessed in Last 24 Hours',
                            font: {
                                size: 16,
                                weight: 'bold'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Count'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Time (HH:MM:SS)'
                            }
                        }
                    }
                }
            });
        }

        // Load chart on page load
        $(document).ready(function() {
            fetchAndDrawChart();
        });
    </script>
</body>
